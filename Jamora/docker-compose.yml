# Jamora full stack - Postgres + Strapi CMS + Next.js storefront.
# Admin/CMS:  http://<server>:9014/admin
# Storefront: http://<server>:3095

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-jamora_strapi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5439}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=$${POSTGRES_PASSWORD} psql -U $${POSTGRES_USER} -d $${POSTGRES_DB} -c 'select 1' >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  strapi:
    build:
      context: ./jamora-strapi
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
      PUBLIC_URL: ${STRAPI_PUBLIC_URL:-http://localhost:9014}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-jamora_strapi}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASE_POOL_MIN: ${DATABASE_POOL_MIN:-2}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      APP_KEYS: ${STRAPI_APP_KEYS:?set STRAPI_APP_KEYS in .env}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT:?set STRAPI_API_TOKEN_SALT in .env}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET:?set STRAPI_ADMIN_JWT_SECRET in .env}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT:?set STRAPI_TRANSFER_TOKEN_SALT in .env}
      JWT_SECRET: ${STRAPI_JWT_SECRET:?set STRAPI_JWT_SECRET in .env}
      JAMORA_COST_RATIO: ${JAMORA_COST_RATIO:-0.42}
      JAMORA_STOREFRONT_URL: ${JAMORA_STOREFRONT_URL:-http://localhost:3095}
      JAMORA_ADMIN_API_SECRET: ${JAMORA_ADMIN_API_SECRET:-}
    volumes:
      - strapi_uploads:/app/public/uploads
    ports:
      - "${STRAPI_PORT:-9014}:1337"

  storefront:
    build:
      context: ./jamora-web
    restart: unless-stopped
    depends_on:
      strapi:
        condition: service_healthy
    environment:
      NODE_ENV: production
      STRAPI_URL: http://strapi:1337
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@jamora.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      ADMIN_SESSION_TOKEN: ${ADMIN_SESSION_TOKEN:-jamora-admin-dev-session}
      JAMORA_ADMIN_API_SECRET: ${JAMORA_ADMIN_API_SECRET:-}
    ports:
      - "${STOREFRONT_PORT:-3095}:3000"

volumes:
  pgdata:
  strapi_uploads:
