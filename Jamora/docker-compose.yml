# Jamora full stack — Postgres + Redis + Medusa (backend/CMS) + Next.js storefront.
# Deploy on a Linux dev server:
#   1) cp .env.example .env   and edit the secrets + PUBLIC_URL values
#   2) docker compose up -d --build
#   3) open the storefront; it auto-discovers the Medusa publishable key
#
# Admin/CMS:  http://<server>:9014/app   (login = MEDUSA_ADMIN_EMAIL / MEDUSA_ADMIN_PASSWORD)
# Storefront: http://<server>:3095

services:
  postgres:
    image: postgres:16
    command: ["postgres", "-c", "max_connections=${POSTGRES_MAX_CONNECTIONS:-200}"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-jamora_medusa}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5439}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=$${POSTGRES_PASSWORD} psql -U $${POSTGRES_USER} -d $${POSTGRES_DB} -c 'select 1' >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6372}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  medusa:
    build:
      context: ./jamora-medusa/apps/backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-jamora_medusa}
      DATABASE_POOL_MIN: ${DATABASE_POOL_MIN:-2}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-50}
      HOST: 0.0.0.0
      PORT: 9000
      REDIS_URL: redis://redis:6379
      MEDUSA_WORKER_MODE: ${MEDUSA_WORKER_MODE:-shared}
      MEDUSA_CLI_TIMEOUT_SECONDS: ${MEDUSA_CLI_TIMEOUT_SECONDS:-240}
      DISABLE_MEDUSA_ADMIN: ${DISABLE_MEDUSA_ADMIN:-false}
      MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL:-http://localhost:9014}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      COOKIE_SECRET: ${COOKIE_SECRET:?set COOKIE_SECRET in .env}
      # Comma-separated origins allowed to call the backend.
      STORE_CORS: ${STORE_CORS:-http://localhost:3095}
      ADMIN_CORS: ${ADMIN_CORS:-http://localhost:9014}
      AUTH_CORS: ${AUTH_CORS:-http://localhost:3095,http://localhost:9014}
      MEDUSA_ADMIN_EMAIL: ${MEDUSA_ADMIN_EMAIL:-admin@jamora.eu}
      MEDUSA_ADMIN_PASSWORD: ${MEDUSA_ADMIN_PASSWORD:-Jamora2026!}
    ports:
      - "${MEDUSA_PORT:-9014}:9000"

  storefront:
    build:
      context: ./jamora-web
    restart: unless-stopped
    depends_on:
      medusa:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Server-side fetches use the internal service hostname.
      MEDUSA_BACKEND_URL: http://medusa:9000
      MEDUSA_PUBLISHABLE_KEY: ${MEDUSA_PUBLISHABLE_KEY:-}
    ports:
      - "${STOREFRONT_PORT:-3095}:3000"

volumes:
  pgdata:
  redisdata:
